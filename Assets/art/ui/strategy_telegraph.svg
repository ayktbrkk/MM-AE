<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- ============================================= -->
  <!-- Strategy Node: Telegraph (İletişim/Comm)      -->
  <!-- Telegraph machine + signal waves, teal bg    -->
  <!-- ============================================= -->
  <!-- Drop shadow -->
  <circle cx="62" cy="62" r="56" fill="#1a2a3a" opacity="0.14"/>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#d4eceb" stroke="#2b2730" stroke-width="8"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="#2b2730" stroke-width="3" opacity="0.10"/>
  <!-- Telegraph machine body -->
  <rect x="36" y="56" width="48" height="20" rx="4" fill="#5b3f2f" stroke="#2b2730" stroke-width="5"/>
  <!-- Telegraph key lever -->
  <rect x="38" y="62" width="18" height="8" rx="2" fill="#2b2730"/>
  <line x1="47" y1="70" x2="47" y2="76" stroke="#2b2730" stroke-width="4" stroke-linecap="round"/>
  <!-- Telegraph paper strip -->
  <rect x="62" y="60" width="18" height="10" rx="2" fill="#f5e8d3" stroke="#2b2730" stroke-width="3"/>
  <!-- Morse code on paper -->
  <circle cx="67" cy="65" r="1.5" fill="#2b2730"/>
  <circle cx="72" cy="65" r="1.5" fill="#2b2730"/>
  <line x1="76" y1="63" x2="76" y2="67" stroke="#2b2730" stroke-width="2"/>
  <!-- Wires going up -->
  <path d="M42 56 C38 44 34 36 28 30" fill="none" stroke="#2b2730" stroke-width="4" stroke-linecap="round"/>
  <path d="M78 56 C82 44 86 36 92 30" fill="none" stroke="#2b2730" stroke-width="4" stroke-linecap="round"/>
  <!-- Signal waves -->
  <path d="M30 28 C36 22 42 22 48 28" fill="none" stroke="#438a87" stroke-width="4" stroke-linecap="round" opacity="0.50"/>
  <path d="M72 28 C78 22 84 22 90 28" fill="none" stroke="#438a87" stroke-width="4" stroke-linecap="round" opacity="0.50"/>
  <path d="M20 20 C30 12 40 12 50 20" fill="none" stroke="#438a87" stroke-width="3" stroke-linecap="round" opacity="0.30"/>
  <path d="M70 20 C80 12 90 12 100 20" fill="none" stroke="#438a87" stroke-width="3" stroke-linecap="round" opacity="0.30"/>
  <!-- Gold accent -->
  <circle cx="60" cy="84" r="4" fill="#f2be63" opacity="0.30"/>
  <!-- Outline ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#2b2730" stroke-width="8"/>
</svg>
