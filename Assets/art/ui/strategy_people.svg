<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- ============================================= -->
  <!-- Strategy Node: People (Güven / Trust)         -->
  <!-- Handshake + people silhouettes, coral bg     -->
  <!-- ============================================= -->
  <!-- Drop shadow -->
  <circle cx="62" cy="62" r="56" fill="#1a2a3a" opacity="0.14"/>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#f0d6c8" stroke="#2b2730" stroke-width="8"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="#2b2730" stroke-width="3" opacity="0.10"/>
  <!-- Left person silhouette -->
  <g fill="#2b2730" opacity="0.34">
    <circle cx="38" cy="46" r="14"/>
    <path d="M38 60 L38 82 M24 66 L52 66"/>
  </g>
  <!-- Right person silhouette -->
  <g fill="#2b2730" opacity="0.34">
    <circle cx="82" cy="46" r="14"/>
    <path d="M82 60 L82 82 M68 66 L96 66"/>
  </g>
  <!-- Handshake in center -->
  <g stroke="#2b2730" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left hand -->
    <path d="M46 58 C48 52 52 50 54 54"/>
    <path d="M46 58 C42 60 40 64 44 66"/>
    <!-- Right hand -->
    <path d="M74 58 C72 52 68 50 66 54"/>
    <path d="M74 58 C78 60 80 64 76 66"/>
    <!-- Handshake overlap -->
    <path d="M52 56 C54 52 58 52 60 56"/>
    <path d="M68 56 C66 52 62 52 60 56"/>
    <path d="M52 58 C56 54 64 54 68 58" stroke-width="5"/>
  </g>
  <!-- Heart / trust symbol between -->
  <path d="M56 74 Q60 70 64 74 Q68 70 72 74 L64 84Z" fill="#d6674b" stroke="#2b2730" stroke-width="3" opacity="0.50"/>
  <!-- Outline ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#2b2730" stroke-width="8"/>
  <!-- Gold accent -->
  <g fill="#f2be63" opacity="0.24">
    <circle cx="38" cy="90" r="4"/>
    <circle cx="82" cy="90" r="4"/>
  </g>
</svg>
