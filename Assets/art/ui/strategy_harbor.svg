<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- ============================================= -->
  <!-- Strategy Node: Harbor (Gözlem / Observation)  -->
  <!-- Gemi dümeni + dürbün, cream bg               -->
  <!-- ============================================= -->
  <!-- Drop shadow -->
  <circle cx="62" cy="62" r="56" fill="#1a2a3a" opacity="0.14"/>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#ecdec8" stroke="#2b2730" stroke-width="8"/>
  <!-- Inner ring -->
  <circle cx="60" cy="56" r="38" fill="none" stroke="#2b2730" stroke-width="3" opacity="0.12"/>
  <!-- Ship wheel -->
  <circle cx="60" cy="56" r="24" fill="none" stroke="#7a5a42" stroke-width="8"/>
  <circle cx="60" cy="56" r="7" fill="#7a5a42" stroke="#2b2730" stroke-width="4"/>
  <!-- Wheel spokes - cardinal -->
  <line x1="60" y1="28" x2="60" y2="84" stroke="#7a5a42" stroke-width="6" stroke-linecap="round"/>
  <line x1="32" y1="56" x2="88" y2="56" stroke="#7a5a42" stroke-width="6" stroke-linecap="round"/>
  <!-- Wheel spokes - diagonal -->
  <line x1="40" y1="36" x2="80" y2="76" stroke="#7a5a42" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="36" x2="40" y2="76" stroke="#7a5a42" stroke-width="5" stroke-linecap="round"/>
  <!-- Wheel handle ends -->
  <g fill="none" stroke="#7a5a42" stroke-width="6" stroke-linecap="round">
    <circle cx="60" cy="28" r="5"/>
    <circle cx="60" cy="84" r="5"/>
    <circle cx="32" cy="56" r="5"/>
    <circle cx="88" cy="56" r="5"/>
    <circle cx="40" cy="36" r="4"/>
    <circle cx="80" cy="76" r="4"/>
    <circle cx="80" cy="36" r="4"/>
    <circle cx="40" cy="76" r="4"/>
  </g>
  <!-- Binoculars / spyglass -->
  <circle cx="46" cy="52" r="9" fill="none" stroke="#2b2730" stroke-width="5"/>
  <circle cx="74" cy="52" r="9" fill="none" stroke="#2b2730" stroke-width="5"/>
  <path d="M52 56 C55 64 65 64 68 56" fill="none" stroke="#2b2730" stroke-width="5" stroke-linecap="round"/>
  <!-- Binocular lens glow -->
  <circle cx="46" cy="52" r="4" fill="#8bd3dc" opacity="0.30"/>
  <circle cx="74" cy="52" r="4" fill="#8bd3dc" opacity="0.30"/>
  <!-- Outline ring (outer) -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#2b2730" stroke-width="8"/>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.28">
    <circle cx="36" cy="82" r="4"/>
    <circle cx="84" cy="82" r="4"/>
  </g>
</svg>
