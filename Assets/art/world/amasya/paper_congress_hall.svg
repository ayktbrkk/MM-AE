<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- ============================================= -->
  <!-- Amasya Congress Hall v1                      -->
  <!-- Historical meeting building with columns      -->
  <!-- Deep navy + crimson + gold palette           -->
  <!-- ============================================= -->
  <ellipse cx="300" cy="370" rx="260" ry="24" fill="#1a2a3a" opacity="0.18"/>
  <!-- Steps -->
  <path d="M120 340 H480 V360 H120Z" fill="#e8dfc8" stroke="#2b2730" stroke-width="6" stroke-linejoin="round"/>
  <path d="M140 320 H460 V340 H140Z" fill="#f5e8d3" stroke="#2b2730" stroke-width="6" stroke-linejoin="round"/>
  <!-- Main building -->
  <rect x="150" y="160" width="300" height="160" fill="#e8dfc8" stroke="#2b2730" stroke-width="8"/>
  <!-- Stone texture lines -->
  <line x1="150" y1="200" x2="450" y2="200" stroke="#7a5a42" stroke-width="3" opacity="0.14"/>
  <line x1="150" y1="240" x2="450" y2="240" stroke="#7a5a42" stroke-width="3" opacity="0.14"/>
  <line x1="150" y1="280" x2="450" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.14"/>
  <line x1="250" y1="160" x2="250" y2="320" stroke="#7a5a42" stroke-width="3" opacity="0.10"/>
  <line x1="350" y1="160" x2="350" y2="320" stroke="#7a5a42" stroke-width="3" opacity="0.10"/>
  <!-- Columns -->
  <g fill="#f5e8d3" stroke="#2b2730" stroke-width="5">
    <rect x="170" y="180" width="22" height="140" rx="3"/>
    <rect x="220" y="180" width="22" height="140" rx="3"/>
    <rect x="358" y="180" width="22" height="140" rx="3"/>
    <rect x="408" y="180" width="22" height="140" rx="3"/>
  </g>
  <!-- Column capitals -->
  <g fill="#dab679" stroke="#2b2730" stroke-width="4">
    <rect x="166" y="176" width="30" height="10" rx="2"/>
    <rect x="216" y="176" width="30" height="10" rx="2"/>
    <rect x="354" y="176" width="30" height="10" rx="2"/>
    <rect x="404" y="176" width="30" height="10" rx="2"/>
  </g>
  <!-- Pediment -->
  <path d="M140 160 L300 70 L460 160Z" fill="#c84b3d" stroke="#2b2730" stroke-width="8" stroke-linejoin="round"/>
  <path d="M160 154 L300 84 L440 154Z" fill="none" stroke="#f2be63" stroke-width="4" stroke-linejoin="round" opacity="0.36"/>
  <!-- Pediment emblem -->
  <circle cx="300" cy="126" r="18" fill="#f5e8d3" stroke="#2b2730" stroke-width="5"/>
  <path d="M290 120 L300 110 L310 120 L310 134 L300 140 L290 134Z" fill="none" stroke="#c84b3d" stroke-width="4" stroke-linejoin="round" opacity="0.60"/>
  <circle cx="300" cy="126" r="4" fill="#2b2730"/>
  <!-- Entrance door -->
  <rect x="270" y="250" width="60" height="70" rx="30" fill="#5b3f2f" stroke="#2b2730" stroke-width="5"/>
  <rect x="270" y="272" width="60" height="48" fill="#5b3f2f"/>
  <!-- Door arch -->
  <path d="M276 250 C276 236 324 236 324 250" fill="none" stroke="#f2be63" stroke-width="4" stroke-linecap="round" opacity="0.36"/>
  <line x1="300" y1="272" x2="300" y2="320" stroke="#2b2730" stroke-width="4" opacity="0.30"/>
  <!-- Windows -->
  <rect x="180" y="228" width="28" height="40" rx="14" fill="#8bd3dc" stroke="#2b2730" stroke-width="4" opacity="0.50"/>
  <rect x="392" y="228" width="28" height="40" rx="14" fill="#8bd3dc" stroke="#2b2730" stroke-width="4" opacity="0.50"/>
  <line x1="194" y1="228" x2="194" y2="268" stroke="#2b2730" stroke-width="3" opacity="0.30"/>
  <line x1="406" y1="228" x2="406" y2="268" stroke="#2b2730" stroke-width="3" opacity="0.30"/>
  <!-- Roof lantern / cupola -->
  <rect x="284" y="50" width="32" height="20" rx="2" fill="#dab679" stroke="#2b2730" stroke-width="4"/>
  <path d="M284 50 L300 34 L316 50Z" fill="#c84b3d" stroke="#2b2730" stroke-width="4" stroke-linejoin="round"/>
  <!-- Flag -->
  <line x1="300" y1="34" x2="300" y2="10" stroke="#5b3f2f" stroke-width="4" stroke-linecap="round"/>
  <rect x="304" y="14" width="24" height="16" rx="2" fill="#c84b3d" stroke="#2b2730" stroke-width="3"/>
  <path d="M312 20 C316 16 322 16 326 20 C322 24 316 24 312 20Z" fill="#fff8e7"/>
  <!-- Gold accents -->
  <g fill="#f2be63" opacity="0.24">
    <circle cx="300" cy="380" r="5"/>
    <circle cx="180" cy="360" r="5"/>
    <circle cx="420" cy="360" r="5"/>
    <circle cx="300" cy="48" r="3"/>
  </g>
</svg>
