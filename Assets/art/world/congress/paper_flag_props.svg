<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- ============================================= -->
  <!-- Flag and Banners Props v2                    -->
  <!-- Turkish flag + pennants + decorative ropes   -->
  <!-- ============================================= -->
  <!-- Drop shadow -->
  <ellipse cx="300" cy="370" rx="200" ry="22" fill="#1a2a3a" opacity="0.16"/>
  <!-- Left flagpole -->
  <line x1="120" y1="360" x2="120" y2="60" stroke="#7a5a42" stroke-width="12" stroke-linecap="round"/>
  <!-- Turkish flag -->
  <rect x="126" y="70" width="100" height="66" rx="4" fill="#c84b3d" stroke="#2b2730" stroke-width="5"/>
  <!-- Flag - crescent -->
  <path d="M160 96 C166 88 182 88 188 96 C194 104 182 108 176 108 C170 108 156 104 160 96Z" fill="#fff8e7"/>
  <circle cx="176" cy="98" r="4" fill="#c84b3d"/>
  <!-- Flag - star -->
  <polygon points="188,90 190,96 196,96 192,100 194,106 188,102 182,106 184,100 180,96 186,96" fill="#fff8e7" transform="scale(0.8) translate(46,22)"/>
  <!-- Right flagpole -->
  <line x1="480" y1="360" x2="480" y2="80" stroke="#7a5a42" stroke-width="12" stroke-linecap="round"/>
  <!-- Second flag - congress banner -->
  <rect x="486" y="90" width="80" height="54" rx="4" fill="#f2be63" stroke="#2b2730" stroke-width="5"/>
  <text x="526" y="120" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2b2730">KONGRE</text>
  <!-- Decorative rope between poles -->
  <path d="M136 140 C200 170 300 180 400 160 C440 150 460 140 486 130" fill="none" stroke="#5b3f2f" stroke-width="4" stroke-linecap="round" opacity="0.50"/>
  <!-- Triangle pennants on rope -->
  <g fill="#c84b3d" opacity="0.40">
    <polygon points="200,158 220,150 210,172"/>
    <polygon points="270,164 290,156 280,178"/>
    <polygon points="340,162 360,154 350,176"/>
    <polygon points="410,152 430,144 420,166"/>
  </g>
  <g fill="#f2be63" opacity="0.36">
    <polygon points="235,162 255,154 245,176"/>
    <polygon points="305,164 325,156 315,178"/>
    <polygon points="375,158 395,150 385,172"/>
  </g>
  <!-- Bottom decorative ribbon -->
  <path d="M160 260 C240 280 360 280 440 260" fill="none" stroke="#f2be63" stroke-width="6" stroke-linecap="round" opacity="0.34"/>
  <path d="M160 272 C240 292 360 292 440 272" fill="none" stroke="#c84b3d" stroke-width="4" stroke-linecap="round" opacity="0.28"/>
  <!-- Scattered decorative elements -->
  <g fill="#f2be63" opacity="0.26">
    <circle cx="200" cy="240" r="8"/>
    <circle cx="400" cy="250" r="7"/>
    <circle cx="300" cy="320" r="6"/>
    <circle cx="150" cy="310" r="5"/>
    <circle cx="450" cy="300" r="5"/>
  </g>
</svg>
