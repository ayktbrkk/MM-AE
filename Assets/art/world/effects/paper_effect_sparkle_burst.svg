<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Toplama Parıltısı - Collection Sparkle Burst -->
  <!-- Outer glow ring -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#f2be63" stroke-width="2" opacity="0.10"/>
  <circle cx="60" cy="60" r="44" fill="none" stroke="#f2be63" stroke-width="2" opacity="0.18"/>
  <!-- Radial sparkle rays -->
  <g stroke="#f2be63" stroke-width="3" stroke-linecap="round" opacity="0.50">
    <!-- 8-point star rays -->
    <line x1="60" y1="12" x2="60" y2="28"/>
    <line x1="60" y1="108" x2="60" y2="92"/>
    <line x1="12" y1="60" x2="28" y2="60"/>
    <line x1="108" y1="60" x2="92" y2="60"/>
    <!-- Diagonal rays -->
    <line x1="26" y1="26" x2="36" y2="36"/>
    <line x1="94" y1="94" x2="84" y2="84"/>
    <line x1="94" y1="26" x2="84" y2="36"/>
    <line x1="26" y1="94" x2="36" y2="84"/>
  </g>
  <!-- Inner rays - shorter -->
  <g stroke="#fff8d9" stroke-width="2" stroke-linecap="round" opacity="0.36">
    <line x1="60" y1="20" x2="60" y2="32"/>
    <line x1="60" y1="100" x2="60" y2="88"/>
    <line x1="20" y1="60" x2="32" y2="60"/>
    <line x1="100" y1="60" x2="88" y2="60"/>
  </g>
  <!-- Sparkle dots -->
  <g fill="#fff8d9" opacity="0.60">
    <circle cx="60" cy="10" r="3"/>
    <circle cx="60" cy="110" r="3"/>
    <circle cx="10" cy="60" r="3"/>
    <circle cx="110" cy="60" r="3"/>
    <circle cx="24" cy="24" r="2.5"/>
    <circle cx="96" cy="96" r="2.5"/>
    <circle cx="96" cy="24" r="2.5"/>
    <circle cx="24" cy="96" r="2.5"/>
  </g>
  <!-- Core glow -->
  <circle cx="60" cy="60" r="12" fill="#f2be63" opacity="0.20"/>
  <circle cx="60" cy="60" r="6" fill="#fff8d9" opacity="0.30"/>
</svg>
