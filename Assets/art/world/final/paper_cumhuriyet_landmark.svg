<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <!-- ============================================= -->
  <!-- Cumhuriyet Landmark v1 - Republic Monument    -->
  <!-- TBMM building with celebratory elements       -->
  <!-- Colors: #f5e8d3, #c84b3d, #d4a017, #2b5e2b   -->
  <!-- Outline: #3c2a1e stroke-width 8-12           -->
  <!-- ============================================= -->
  <!-- Ground shadow -->
  <ellipse cx="300" cy="470" rx="270" ry="22" fill="#0a1a0a" opacity="0.18"/>
  <!-- Pedestal base -->
  <path d="M100 440 H500 V460 H100Z" fill="#d4a017" stroke="#3c2a1e" stroke-width="6" stroke-linejoin="round"/>
  <path d="M130 420 H470 V440 H130Z" fill="#f5e8d3" stroke="#3c2a1e" stroke-width="6" stroke-linejoin="round"/>
  <path d="M150 400 H450 V420 H150Z" fill="#e8dfc8" stroke="#3c2a1e" stroke-width="6" stroke-linejoin="round"/>
  <!-- Main building body -->
  <rect x="170" y="220" width="260" height="180" fill="#f5e8d3" stroke="#3c2a1e" stroke-width="10"/>
  <!-- Upper wall section -->
  <rect x="190" y="210" width="220" height="100" fill="#fff8e7" stroke="#3c2a1e" stroke-width="6"/>
  <!-- Decorative horizontal bands -->
  <rect x="190" y="270" width="220" height="6" fill="#d4a017" stroke="#3c2a1e" stroke-width="4"/>
  <rect x="190" y="282" width="220" height="6" fill="#c84b3d" stroke="#3c2a1e" stroke-width="4" opacity="0.60"/>
  <!-- Main entrance door -->
  <rect x="268" y="330" width="64" height="70" rx="32" fill="#5b3f2f" stroke="#3c2a1e" stroke-width="6"/>
  <rect x="268" y="350" width="64" height="50" fill="#5b3f2f"/>
  <!-- Door arch detail -->
  <path d="M276 330 C276 314 324 314 324 330" fill="none" stroke="#d4a017" stroke-width="4" stroke-linecap="round" opacity="0.50"/>
  <!-- Side windows -->
  <rect x="198" y="300" width="28" height="44" rx="14" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="5" opacity="0.50"/>
  <line x1="212" y1="300" x2="212" y2="344" stroke="#3c2a1e" stroke-width="3" opacity="0.30"/>
  <rect x="374" y="300" width="28" height="44" rx="14" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="5" opacity="0.50"/>
  <line x1="388" y1="300" x2="388" y2="344" stroke="#3c2a1e" stroke-width="3" opacity="0.30"/>
  <!-- Upper windows -->
  <rect x="220" y="230" width="24" height="36" rx="12" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.45"/>
  <rect x="260" y="230" width="24" height="36" rx="12" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.45"/>
  <rect x="316" y="230" width="24" height="36" rx="12" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.45"/>
  <rect x="356" y="230" width="24" height="36" rx="12" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.45"/>
  <!-- Front columns -->
  <g fill="#f5e8d3" stroke="#3c2a1e" stroke-width="5">
    <rect x="200" y="290" width="20" height="110" rx="3"/>
    <rect x="240" y="290" width="20" height="110" rx="3"/>
    <rect x="340" y="290" width="20" height="110" rx="3"/>
    <rect x="380" y="290" width="20" height="110" rx="3"/>
  </g>
  <!-- Column capitals -->
  <g fill="#d4a017" stroke="#3c2a1e" stroke-width="4">
    <rect x="196" y="286" width="28" height="10" rx="2"/>
    <rect x="236" y="286" width="28" height="10" rx="2"/>
    <rect x="336" y="286" width="28" height="10" rx="2"/>
    <rect x="376" y="286" width="28" height="10" rx="2"/>
  </g>
  <!-- Pediment (triangular top) -->
  <path d="M160 220 L300 130 L440 220Z" fill="#c84b3d" stroke="#3c2a1e" stroke-width="10" stroke-linejoin="round"/>
  <!-- Pediment inner decoration -->
  <path d="M180 214 L300 146 L420 214Z" fill="none" stroke="#d4a017" stroke-width="5" stroke-linejoin="round" opacity="0.50"/>
  <!-- Pediment star emblem -->
  <polygon points="300,158 304,170 316,170 306,178 310,190 300,182 290,190 294,178 284,170 296,170" fill="#d4a017" stroke="#3c2a1e" stroke-width="3"/>
  <!-- Roof -->
  <path d="M150 220 L300 110 L450 220Z" fill="#2b5e2b" stroke="#3c2a1e" stroke-width="10" stroke-linejoin="round"/>
  <!-- Roof tile lines -->
  <path d="M200 190 L400 190" fill="none" stroke="#3c2a1e" stroke-width="3" stroke-linejoin="round" opacity="0.30"/>
  <path d="M175 206 L425 206" fill="none" stroke="#3c2a1e" stroke-width="3" stroke-linejoin="round" opacity="0.30"/>
  <!-- Flag pole -->
  <line x1="300" y1="110" x2="300" y2="40" stroke="#5b3f2f" stroke-width="7" stroke-linecap="round"/>
  <!-- Turkish flag -->
  <rect x="304" y="44" width="48" height="30" rx="2" fill="#c84b3d" stroke="#3c2a1e" stroke-width="5"/>
  <!-- Flag crescent -->
  <path d="M328 54 C334 48 348 48 352 54 C356 60 346 62 342 62 C338 62 324 58 328 54Z" fill="#fff8e7"/>
  <circle cx="344" cy="55" r="3" fill="#c84b3d"/>
  <!-- Flag star -->
  <polygon points="334,50 336,54 340,54 337,57 338,61 334,59 330,61 331,57 328,54 332,54" fill="#fff8e7"/>
  <!-- Side extensions - left wing -->
  <rect x="120" y="260" width="50" height="140" fill="#e8dfc8" stroke="#3c2a1e" stroke-width="8"/>
  <rect x="135" y="290" width="20" height="32" rx="10" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.40"/>
  <rect x="135" y="340" width="20" height="32" rx="10" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.40"/>
  <!-- Side extensions - right wing -->
  <rect x="430" y="260" width="50" height="140" fill="#e8dfc8" stroke="#3c2a1e" stroke-width="8"/>
  <rect x="445" y="290" width="20" height="32" rx="10" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.40"/>
  <rect x="445" y="340" width="20" height="32" rx="10" fill="#8bd3dc" stroke="#3c2a1e" stroke-width="4" opacity="0.40"/>
  <!-- "29 EKIM 1923" banner -->
  <rect x="210" y="380" width="180" height="28" rx="4" fill="#d4a017" stroke="#3c2a1e" stroke-width="4" opacity="0.70"/>
  <g fill="#3c2a1e" opacity="0.70">
    <!-- Simplified text representation as dots/blocks -->
    <rect x="220" y="388" width="8" height="12" rx="1"/>
    <rect x="234" y="388" width="8" height="12" rx="1"/>
    <rect x="248" y="388" width="8" height="12" rx="1"/>
    <rect x="262" y="388" width="8" height="12" rx="1"/>
    <rect x="276" y="388" width="8" height="12" rx="1"/>
    <rect x="296" y="388" width="8" height="12" rx="1"/>
    <rect x="310" y="388" width="8" height="12" rx="1"/>
    <rect x="324" y="388" width="8" height="12" rx="1"/>
    <rect x="338" y="388" width="8" height="12" rx="1"/>
    <rect x="352" y="388" width="8" height="12" rx="1"/>
    <rect x="366" y="388" width="8" height="12" rx="1"/>
  </g>
  <!-- Gold accent dots -->
  <g fill="#d4a017" opacity="0.28">
    <circle cx="300" cy="460" r="8"/>
    <circle cx="160" cy="440" r="7"/>
    <circle cx="440" cy="440" r="7"/>
    <circle cx="200" cy="260" r="5"/>
    <circle cx="400" cy="260" r="5"/>
  </g>
  <!-- Celebration sparkles -->
  <g fill="#fff8e7" opacity="0.22">
    <circle cx="120" cy="100" r="4"/>
    <circle cx="480" cy="100" r="4"/>
    <circle cx="300" cy="20" r="4"/>
    <circle cx="80" cy="180" r="3"/>
    <circle cx="520" cy="180" r="3"/>
    <circle cx="180" cy="140" r="3"/>
    <circle cx="420" cy="140" r="3"/>
  </g>
</svg>
