<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <!-- ============================================= -->
  <!-- Victory Arch v1 - Cumhuriyet Takı             -->
  <!-- Triumphal arch with victory motifs             -->
  <!-- Colors: #f5e8d3, #c84b3d, #d4a017             -->
  <!-- Outline: #3c2a1e stroke-width 8              -->
  <!-- ============================================= -->
  <!-- Ground shadow -->
  <ellipse cx="200" cy="480" rx="170" ry="16" fill="#0a1a0a" opacity="0.18"/>
  <!-- Base left -->
  <rect x="30" y="380" width="70" height="90" rx="3" fill="#f5e8d3" stroke="#3c2a1e" stroke-width="8"/>
  <!-- Base right -->
  <rect x="300" y="380" width="70" height="90" rx="3" fill="#f5e8d3" stroke="#3c2a1e" stroke-width="8"/>
  <!-- Arch span -->
  <path d="M100 470 L100 280 C100 180 300 180 300 280 L300 470" fill="none" stroke="#3c2a1e" stroke-width="10"/>
  <!-- Arch inner fill -->
  <path d="M108 468 L108 284 C108 192 292 192 292 284 L292 468Z" fill="#e8dfc8" stroke="#3c2a1e" stroke-width="6"/>
  <!-- Arch background (sky showing through) -->
  <path d="M116 468 L116 288 C116 200 284 200 284 288 L284 468Z" fill="#4a7ab5" opacity="0.40"/>
  <!-- Keystone -->
  <polygon points="190,170 210,170 216,190 184,190" fill="#d4a017" stroke="#3c2a1e" stroke-width="5"/>
  <!-- Keystone inner -->
  <circle cx="200" cy="180" r="6" fill="#c84b3d" stroke="#3c2a1e" stroke-width="3"/>
  <!-- Top entablature -->
  <rect x="20" y="140" width="360" height="30" rx="2" fill="#f5e8d3" stroke="#3c2a1e" stroke-width="8"/>
  <!-- Upper decorative band -->
  <rect x="20" y="130" width="360" height="14" rx="2" fill="#c84b3d" stroke="#3c2a1e" stroke-width="6"/>
  <!-- Top pediment -->
  <path d="M20 130 L200 40 L380 130Z" fill="#d4a017" stroke="#3c2a1e" stroke-width="8" stroke-linejoin="round"/>
  <!-- Pediment star -->
  <polygon points="200,72 204,84 216,84 206,92 210,104 200,96 190,104 194,92 184,84 196,84" fill="#fff8e7" stroke="#3c2a1e" stroke-width="3"/>
  <!-- Left column detail -->
  <g fill="#f5e8d3" stroke="#3c2a1e" stroke-width="4">
    <rect x="40" y="240" width="16" height="80" rx="3"/>
    <rect x="84" y="240" width="16" height="80" rx="3"/>
  </g>
  <!-- Right column detail -->
  <g fill="#f5e8d3" stroke="#3c2a1e" stroke-width="4">
    <rect x="300" y="240" width="16" height="80" rx="3"/>
    <rect x="344" y="240" width="16" height="80" rx="3"/>
  </g>
  <!-- Column capitals left -->
  <g fill="#d4a017" stroke="#3c2a1e" stroke-width="3">
    <rect x="36" y="236" width="24" height="8" rx="2"/>
    <rect x="80" y="236" width="24" height="8" rx="2"/>
  </g>
  <!-- Column capitals right -->
  <g fill="#d4a017" stroke="#3c2a1e" stroke-width="3">
    <rect x="296" y="236" width="24" height="8" rx="2"/>
    <rect x="340" y="236" width="24" height="8" rx="2"/>
  </g>
  <!-- Laurel wreath left -->
  <g stroke="#3a6b2a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.38">
    <path d="M186 130 C170 120 150 114 134 124"/>
    <path d="M182 138 C164 128 144 122 128 132"/>
    <path d="M178 146 C158 136 138 130 122 140"/>
  </g>
  <!-- Laurel wreath right -->
  <g stroke="#3a6b2a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.38">
    <path d="M214 130 C230 120 250 114 266 124"/>
    <path d="M218 138 C236 128 256 122 272 132"/>
    <path d="M222 146 C242 136 262 130 278 140"/>
  </g>
  <!-- Small flags on top -->
  <g>
    <line x1="60" y1="130" x2="60" y2="80" stroke="#5b3f2f" stroke-width="4" stroke-linecap="round"/>
    <rect x="62" y="82" width="24" height="16" rx="1" fill="#c84b3d" stroke="#3c2a1e" stroke-width="3"/>
    <line x1="340" y1="130" x2="340" y2="80" stroke="#5b3f2f" stroke-width="4" stroke-linecap="round"/>
    <rect x="314" y="82" width="24" height="16" rx="1" fill="#c84b3d" stroke="#3c2a1e" stroke-width="3"/>
  </g>
  <!-- Gold accent dots -->
  <g fill="#d4a017" opacity="0.24">
    <circle cx="200" cy="460" r="6"/>
    <circle cx="100" cy="400" r="5"/>
    <circle cx="300" cy="400" r="5"/>
    <circle cx="200" cy="220" r="4"/>
    <circle cx="140" cy="320" r="4"/>
    <circle cx="260" cy="320" r="4"/>
  </g>
  <!-- Sparkles -->
  <g fill="#fff8e7" opacity="0.18">
    <circle cx="120" cy="60" r="3"/>
    <circle cx="280" cy="60" r="3"/>
    <circle cx="200" cy="30" r="3"/>
    <circle cx="80" cy="100" r="2"/>
    <circle cx="320" cy="100" r="2"/>
  </g>
</svg>
