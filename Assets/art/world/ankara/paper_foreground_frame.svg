<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780">
  <!-- ============================================= -->
  <!-- Ankara Foreground Frame v1                    -->
  <!-- Ankara Castle silhouettes + steppe branches   -->
  <!-- Warm earth + olive tones                      -->
  <!-- ============================================= -->
  <!-- Bottom ground silhouette -->
  <path d="M0 540 C180 500 340 530 520 600 C700 672 880 660 1060 600 C1240 540 1420 526 1600 570 V780 H0Z" fill="#7a5a42" opacity="0.42"/>
  <!-- Mid ground terrain -->
  <path d="M0 460 C140 424 260 438 400 490 C500 526 620 534 780 516 C980 496 1140 450 1600 476 V780 H0Z" fill="#20344f" opacity="0.20"/>
  <!-- Left side - Ankara Castle silhouette -->
  <g fill="#1a2a3a" opacity="0.56">
    <!-- Castle wall -->
    <path d="M0 40 C60 60 110 120 130 240 C142 320 148 400 140 520 V780 H0Z"/>
    <!-- Castle tower left -->
    <rect x="20" y="60" width="40" height="80" rx="2"/>
    <rect x="16" y="56" width="48" height="10"/>
    <!-- Battlements -->
    <rect x="20" y="56" width="10" height="14"/>
    <rect x="36" y="56" width="10" height="14"/>
    <rect x="52" y="56" width="10" height="14"/>
    <!-- Castle tower right -->
    <rect x="90" y="90" width="36" height="60" rx="2"/>
    <rect x="86" y="86" width="44" height="10"/>
    <rect x="90" y="86" width="8" height="12"/>
    <rect x="104" y="86" width="8" height="12"/>
    <rect x="118" y="86" width="8" height="12"/>
  </g>
  <!-- Right side - town silhouette -->
  <g fill="#1a2a3a" opacity="0.50">
    <path d="M1600 30 C1480 60 1380 160 1340 300 C1318 380 1306 460 1320 560 V780 H1600Z"/>
    <!-- Building rooftops -->
    <path d="M1440 120 L1480 80 L1520 120Z" fill="#1a2a3a" opacity="0.55"/>
    <path d="M1500 160 L1540 120 L1580 160Z" fill="#1a2a3a" opacity="0.48"/>
    <rect x="1420" y="180" width="40" height="50" rx="2" fill="#1a2a3a" opacity="0.45"/>
    <rect x="1440" y="140" width="30" height="40" rx="2" fill="#1a2a3a" opacity="0.50"/>
    <!-- Minaret silhouette -->
    <rect x="1384" y="90" width="8" height="70" fill="#1a2a3a" opacity="0.52"/>
    <ellipse cx="1388" cy="86" rx="10" ry="8" fill="#1a2a3a" opacity="0.52"/>
    <ellipse cx="1388" cy="86" rx="3" ry="3" fill="#20344f" opacity="0.30"/>
  </g>
  <!-- Left foreground tree/branch silhouettes -->
  <g fill="#1a2a3a" opacity="0.52">
    <path d="M0 100 C50 130 100 200 120 310 V780 H0Z"/>
    <path d="M40 180 C90 154 140 168 180 200" stroke="#1a2a3a" stroke-width="12" stroke-linecap="round" opacity="0.46"/>
    <path d="M20 260 C80 232 130 244 170 280" stroke="#1a2a3a" stroke-width="10" stroke-linecap="round" opacity="0.42"/>
    <path d="M60 140 C100 120 140 130 160 158" stroke="#1a2a3a" stroke-width="8" stroke-linecap="round" opacity="0.38"/>
  </g>
  <!-- Decorative branch/vine elements -->
  <g stroke="#8b7355" stroke-width="14" stroke-linecap="round" opacity="0.48">
    <path d="M100 580 C130 514 162 474 198 440"/>
    <path d="M1482 592 C1450 528 1416 482 1376 442"/>
    <path d="M230 654 C318 614 408 612 502 652"/>
    <path d="M1090 650 C1202 598 1316 606 1450 644"/>
  </g>
  <!-- Light branch overlay -->
  <g stroke="#c4a46c" stroke-width="8" stroke-linecap="round" opacity="0.28">
    <path d="M60 548 C110 506 162 488 214 508"/>
    <path d="M1544 556 C1486 516 1426 496 1376 518"/>
  </g>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.30">
    <circle cx="200" cy="590" r="16"/>
    <circle cx="1370" cy="598" r="18"/>
    <circle cx="1220" cy="674" r="12"/>
    <circle cx="360" cy="568" r="10"/>
    <circle cx="1000" cy="628" r="11"/>
    <circle cx="660" cy="660" r="9"/>
  </g>
