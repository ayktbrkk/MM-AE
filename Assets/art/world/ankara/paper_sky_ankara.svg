<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <!-- ============================================= -->
  <!-- Ankara Sky - Warm Steppe Afternoon            -->
  <!-- Light blue to golden wheat gradient           -->
  <!-- ============================================= -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="40%" stop-color="#a8d8ea"/>
      <stop offset="70%" stop-color="#d4c5a9"/>
      <stop offset="100%" stop-color="#f5deb3"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#f5deb3" stop-opacity="0.50"/>
      <stop offset="40%" stop-color="#f5deb3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5deb3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base sky gradient -->
  <rect width="1500" height="800" fill="url(#skyGrad)"/>
  <!-- Sun glow -->
  <rect width="1500" height="800" fill="url(#sunGlow)"/>
  <!-- Sun disk -->
  <circle cx="750" cy="240" r="45" fill="#f5deb3" opacity="0.40"/>
  <circle cx="750" cy="240" r="90" fill="#f5deb3" opacity="0.12"/>
  <circle cx="750" cy="240" r="160" fill="#f5deb3" opacity="0.05"/>
  <!-- Distant dusty atmosphere layers -->
  <path d="M0 380 C200 340 380 364 560 320 C740 276 880 300 1060 260 C1240 220 1380 244 1500 200 V800 H0Z" fill="#d4c5a9" opacity="0.15"/>
  <path d="M0 460 C250 420 420 450 600 400 C780 350 940 384 1120 334 C1280 288 1400 310 1500 270 V800 H0Z" fill="#c4a46c" opacity="0.12"/>
  <path d="M0 540 C280 498 460 532 640 478 C820 424 960 454 1140 404 C1300 358 1420 384 1500 340 V800 H0Z" fill="#8b7355" opacity="0.10"/>
  <!-- Dust motes / golden haze -->
  <g fill="#f5deb3" opacity="0.12">
    <ellipse cx="400" cy="280" rx="160" ry="24"/>
    <ellipse cx="850" cy="320" rx="200" ry="28"/>
    <ellipse cx="1150" cy="260" rx="140" ry="20"/>
  </g>
  <!-- Steppe grass hints on horizon -->
  <g stroke="#c4a46c" stroke-width="3" stroke-linecap="round" opacity="0.20">
    <path d="M200 380 L210 360 L220 380"/>
    <path d="M350 370 L358 348 L366 370"/>
    <path d="M520 362 L528 340 L536 362"/>
    <path d="M680 358 L688 336 L696 358"/>
    <path d="M850 368 L858 346 L866 368"/>
    <path d="M1020 374 L1028 352 L1036 374"/>
    <path d="M1200 380 L1208 358 L1216 380"/>
    <path d="M1380 386 L1388 364 L1396 386"/>
  </g>
  <!-- Warm light streaks -->
  <g stroke="#fff8d9" stroke-width="5" stroke-linecap="round" opacity="0.08">
    <path d="M180 640 H380"/>
    <path d="M680 600 H880"/>
    <path d="M1120 560 H1380"/>
  </g>
</svg>
