<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- ============================================= -->
  <!-- Civic Square / Town Square v2                -->
  <!-- Stone pavement + people silhouettes + trees  -->
  <!-- ============================================= -->
  <!-- Ground shadow -->
  <ellipse cx="300" cy="370" rx="280" ry="26" fill="#1a2a3a" opacity="0.16"/>
  <!-- Stone pavement base -->
  <path d="M60 340 C60 280 120 240 300 240 C480 240 540 280 540 340 V360 H60Z" fill="#e8dfc8" stroke="#2b2730" stroke-width="8" stroke-linejoin="round"/>
  <!-- Inner pavement -->
  <path d="M90 330 C90 282 148 252 300 252 C452 252 510 282 510 330 V350 H90Z" fill="#f5e8d3" stroke="none"/>
  <!-- Cobblestone pattern -->
  <g fill="none" stroke="#7a5a42" stroke-width="3" opacity="0.16">
    <path d="M150 280 C180 270 220 272 250 284"/>
    <path d="M340 280 C370 268 410 270 440 284"/>
    <path d="M120 310 C160 298 200 300 240 312"/>
    <path d="M350 310 C390 298 430 300 470 312"/>
    <path d="M280 270 C300 262 320 264 340 276"/>
    <path d="M280 300 C300 292 320 294 340 306"/>
  </g>
  <!-- Center monument/fountain base -->
  <ellipse cx="300" cy="300" rx="40" ry="12" fill="#dab679" stroke="#2b2730" stroke-width="5"/>
  <!-- Fountain -->
  <rect x="290" y="268" width="20" height="32" fill="#e8dfc8" stroke="#2b2730" stroke-width="4"/>
  <ellipse cx="300" cy="268" rx="18" ry="6" fill="#f5e8d3" stroke="#2b2730" stroke-width="4"/>
  <!-- Water -->
  <path d="M300 268 C296 254 304 254 300 244" fill="none" stroke="#8bd3dc" stroke-width="4" stroke-linecap="round" opacity="0.50"/>
  <circle cx="300" cy="240" r="4" fill="#8bd3dc" opacity="0.40"/>
  <!-- Left tree -->
  <g>
    <rect x="108" y="260" width="10" height="60" rx="3" fill="#5b3f2f"/>
    <circle cx="113" cy="244" r="30" fill="#8db572" stroke="#2b2730" stroke-width="5" opacity="0.60"/>
    <circle cx="100" cy="240" r="22" fill="#8db572" stroke="#2b2730" stroke-width="4" opacity="0.50"/>
    <circle cx="126" cy="240" r="22" fill="#8db572" stroke="#2b2730" stroke-width="4" opacity="0.50"/>
  </g>
  <!-- Right tree -->
  <g>
    <rect x="482" y="260" width="10" height="60" rx="3" fill="#5b3f2f"/>
    <circle cx="487" cy="244" r="30" fill="#8db572" stroke="#2b2730" stroke-width="5" opacity="0.60"/>
    <circle cx="474" cy="240" r="22" fill="#8db572" stroke="#2b2730" stroke-width="4" opacity="0.50"/>
    <circle cx="500" cy="240" r="22" fill="#8db572" stroke="#2b2730" stroke-width="4" opacity="0.50"/>
  </g>
  <!-- People silhouettes (small) -->
  <g fill="#2b2730" opacity="0.24">
    <!-- Person 1 -->
    <circle cx="180" cy="310" r="8"/>
    <path d="M180 318 L180 340 M172 326 L188 326"/>
    <!-- Person 2 -->
    <circle cx="220" cy="316" r="7"/>
    <path d="M220 323 L220 342 M214 330 L226 330"/>
    <!-- Person 3 -->
    <circle cx="380" cy="314" r="8"/>
    <path d="M380 322 L380 344 M374 330 L386 330"/>
    <!-- Person 4 -->
    <circle cx="420" cy="308" r="7"/>
    <path d="M420 315 L420 338 M414 324 L426 324"/>
    <!-- Person 5 (smaller, child) -->
    <circle cx="160" cy="322" r="5"/>
    <path d="M160 327 L160 340 M156 332 L164 332"/>
  </g>
  <!-- Notice board / bulletin -->
  <rect x="240" y="250" width="30" height="24" fill="#dab679" stroke="#2b2730" stroke-width="4" opacity="0.50"/>
  <!-- Small papers on board -->
  <rect x="244" y="254" width="10" height="6" fill="#f5e8d3" stroke="#2b2730" stroke-width="2"/>
  <rect x="256" y="254" width="10" height="6" fill="#f5e8d3" stroke="#2b2730" stroke-width="2"/>
  <rect x="244" y="262" width="10" height="6" fill="#f5e8d3" stroke="#2b2730" stroke-width="2"/>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.26">
    <circle cx="300" cy="362" r="5"/>
    <circle cx="160" cy="350" r="6"/>
    <circle cx="440" cy="350" r="6"/>
    <circle cx="240" cy="270" r="4"/>
    <circle cx="360" cy="270" r="4"/>
  </g>
</svg>
