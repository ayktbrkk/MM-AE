<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <!-- ============================================= -->
  <!-- Sakarya Sky - Dramatic Sunset/War             -->
  <!-- Dark red/gray gradient, smoke haze            -->
  <!-- ============================================= -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="30%" stop-color="#6b4a3a"/>
      <stop offset="60%" stop-color="#b84a3a"/>
      <stop offset="85%" stop-color="#d4694a"/>
      <stop offset="100%" stop-color="#8b4a3a"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4694a" stop-opacity="0.40"/>
      <stop offset="30%" stop-color="#b84a3a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4694a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="smokeHaze" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8b7355" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base sky gradient -->
  <rect width="1500" height="800" fill="url(#skyGrad)"/>
  <!-- Sun glow -->
  <rect width="1500" height="800" fill="url(#sunGlow)"/>
  <!-- Smoke haze layers -->
  <rect width="1500" height="800" fill="url(#smokeHaze)"/>
  <!-- Sun disk - dimmed by battle smoke -->
  <circle cx="750" cy="320" r="35" fill="#d4694a" opacity="0.30"/>
  <circle cx="750" cy="320" r="70" fill="#d4694a" opacity="0.10"/>
  <circle cx="750" cy="320" r="130" fill="#d4694a" opacity="0.04"/>
  <!-- Dark smoke / cloud bands -->
  <path d="M0 200 C200 180 380 220 560 170 C740 120 880 160 1060 110 C1240 60 1380 90 1500 50 V400 H0Z" fill="#3a2a1a" opacity="0.20"/>
  <path d="M0 280 C250 250 420 290 600 240 C780 190 940 230 1120 180 C1280 136 1400 160 1500 120 V450 H0Z" fill="#4a3a2a" opacity="0.15"/>
  <path d="M0 360 C280 330 460 370 640 320 C820 270 960 310 1140 260 C1300 216 1420 240 1500 200 V500 H0Z" fill="#5c4a3a" opacity="0.12"/>
  <!-- Battle smoke plumes -->
  <g fill="#4a3a2a" opacity="0.08">
    <ellipse cx="200" cy="180" rx="140" ry="50"/>
    <ellipse cx="600" cy="140" rx="180" ry="60"/>
    <ellipse cx="1000" cy="160" rx="160" ry="55"/>
    <ellipse cx="1300" cy="120" rx="120" ry="45"/>
  </g>
  <!-- Distant dust atmosphere -->
  <path d="M0 460 C250 420 420 450 600 400 C780 350 940 384 1120 334 C1280 288 1400 310 1500 270 V800 H0Z" fill="#6b4a3a" opacity="0.12"/>
  <path d="M0 540 C280 498 460 532 640 478 C820 424 960 454 1140 404 C1300 358 1420 384 1500 340 V800 H0Z" fill="#5c3a1e" opacity="0.10"/>
  <!-- Dark haze streaks -->
  <g stroke="#3a2a1a" stroke-width="6" stroke-linecap="round" opacity="0.06">
    <path d="M200 500 H450"/>
    <path d="M700 460 H980"/>
    <path d="M1100 420 H1420"/>
  </g>
  <!-- Burnt umber dust motes -->
  <g fill="#8b4a3a" opacity="0.08">
    <ellipse cx="350" cy="380" rx="120" ry="20"/>
    <ellipse cx="850" cy="420" rx="150" ry="24"/>
    <ellipse cx="1200" cy="360" rx="110" ry="18"/>
  </g>
  <!-- Withered grass hints on horizon -->
  <g stroke="#5c3a1e" stroke-width="3" stroke-linecap="round" opacity="0.14">
    <path d="M200 380 L208 362 L216 380"/>
    <path d="M350 370 L358 352 L366 370"/>
    <path d="M520 362 L528 344 L536 362"/>
    <path d="M680 358 L688 340 L696 358"/>
    <path d="M850 368 L858 350 L866 368"/>
    <path d="M1020 374 L1028 356 L1036 374"/>
    <path d="M1200 380 L1208 362 L1216 380"/>
    <path d="M1380 386 L1388 368 L1396 386"/>
  </g>
</svg>
