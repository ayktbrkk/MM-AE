<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <!-- ============================================= -->
  <!-- Sakarya Battle Terrain v1                     -->
  <!-- Dark war tones: #8b7355, #6b4423, #5c3a1e    -->
  <!-- Craters, trenches, rugged battlefield         -->
  <!-- Outline: #3c2a1e stroke-width 12             -->
  <!-- ============================================= -->
  <!-- Deep shadow layer -->
  <path d="M30 1340 C70 1200 190 1100 350 1040 C510 980 690 960 830 1000 C970 1040 1040 1120 1050 1240 C1060 1360 1030 1480 950 1580 C870 1680 710 1740 530 1740 C350 1740 190 1700 110 1600 C30 1500 10 1420 30 1340Z" fill="#2a1a0e" opacity="0.20"/>
  <!-- Base terrain - dark brown battlefield -->
  <path d="M10 1300 C50 1160 170 1060 330 1000 C490 940 670 920 810 960 C950 1000 1020 1080 1030 1200 C1040 1320 1010 1440 930 1540 C850 1640 690 1700 510 1700 C330 1700 170 1660 90 1560 C10 1460 -10 1380 10 1300Z" fill="#6b4423"/>
  <!-- Mid terrain - rugged battle plain -->
  <path d="M70 1220 C110 1100 220 1020 370 964 C520 908 670 896 790 934 C910 972 974 1044 982 1152 C990 1260 964 1372 890 1460 C816 1548 670 1600 510 1600 C350 1600 208 1564 134 1480 C60 1396 42 1316 70 1220Z" fill="#5c3a1e"/>
