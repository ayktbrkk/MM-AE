    <circle cx="560" cy="1080" r="5"/>
    <circle cx="740" cy="1140" r="7"/>
    <circle cx="430" cy="1340" r="5"/>
    <circle cx="650" cy="1400" r="6"/>
    <circle cx="250" cy="1310" r="4"/>
    <circle cx="880" cy="1280" r="5"/>
    <circle cx="380" cy="1200" r="4"/>
