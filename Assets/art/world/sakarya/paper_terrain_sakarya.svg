  <!-- Bottom ground -->
  <path d="M90 1520 C170 1420 330 1360 490 1320 C650 1280 770 1300 860 1360 C950 1420 970 1540 890 1640 C810 1740 650 1780 490 1780 C330 1780 170 1740 90 1660 C10 1580 30 1560 90 1520Z" fill="#4a2f18"/>
  <!-- Outline - thick paper cutout style -->
