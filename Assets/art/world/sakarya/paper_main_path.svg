  <path d="M420 260 C520 240 620 260 710 330" fill="none" stroke="#8b7355" stroke-width="38" stroke-linecap="round" opacity="0.80"/>
  <path d="M420 260 C520 240 620 260 710 330" fill="none" stroke="#6b4423" stroke-width="14" stroke-linecap="round" opacity="0.20"/>
  <!-- Bootprint / march shadow pads -->
  <g fill="#0a0a1a" opacity="0.16">
    <ellipse cx="450" cy="740" rx="30" ry="10"/>
    <ellipse cx="430" cy="620" rx="28" ry="10"/>
    <ellipse cx="400" cy="500" rx="26" ry="9"/>
    <ellipse cx="400" cy="380" rx="28" ry="10"/>
    <ellipse cx="460" cy="280" rx="26" ry="9"/>
    <ellipse cx="515" cy="180" rx="24" ry="8"/>
    <ellipse cx="250" cy="460" rx="22" ry="8"/>
    <ellipse cx="580" cy="290" rx="20" ry="7"/>
  </g>
  <!-- Dark earth dots along path -->
  <g fill="#6b4423" opacity="0.30">
    <circle cx="445" cy="700" r="8"/>
    <circle cx="420" cy="560" r="7"/>
    <circle cx="395" cy="440" r="6"/>
    <circle cx="440" cy="340" r="7"/>
    <circle cx="480" cy="240" r="6"/>
    <circle cx="210" cy="470" r="5"/>
    <circle cx="600" cy="300" r="5"/>
  </g>
