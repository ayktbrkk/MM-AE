<svg xmlns="http://www.w3.org/2000/svg" width="920" height="900" viewBox="0 0 920 900">
  <!-- ============================================= -->
  <!-- Sakarya Main Path v1                          -->
  <!-- Taarruz yolu - soldan sağa kıvrılan yol       -->
  <!-- Dark war tones, battle path to HQ             -->
  <!-- ============================================= -->
  <!-- Shadow layer -->
  <path d="M460 820 C440 680 420 580 390 490 C360 400 380 320 420 260 C460 200 470 150 460 90" fill="none" stroke="#0a0a0a" stroke-width="86" stroke-linecap="round" stroke-linejoin="round" opacity="0.20"/>
  <!-- Main path - battle-worn earth -->
  <path d="M460 820 C440 680 420 580 390 490 C360 400 380 320 420 260 C460 200 470 150 460 90" fill="none" stroke="#8b7355" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
  <!-- Path inner - dark tan -->
  <path d="M460 820 C440 680 420 580 390 490 C360 400 380 320 420 260 C460 200 470 150 460 90" fill="none" stroke="#6b4423" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.30"/>
  <!-- Branch path - left (to battlefield forward positions) -->
  <path d="M390 490 C310 450 220 440 120 490" fill="none" stroke="#0a0a0a" stroke-width="56" stroke-linecap="round" opacity="0.12"/>
