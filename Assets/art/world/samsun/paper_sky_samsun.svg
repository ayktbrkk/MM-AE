<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760">
  <!-- Samsun Sky - Dawn Arrival, Rift Energy -->
  <rect width="1500" height="760" fill="#067078"/>
  <!-- Sunrise sun -->
  <circle cx="860" cy="240" r="64" fill="#f2be63" opacity=".52"/>
  <circle cx="860" cy="240" r="130" fill="#f2be63" opacity=".16"/>
  <circle cx="860" cy="240" r="200" fill="#f2be63" opacity=".06"/>
  <!-- Rift energy horizon glow -->
  <circle cx="860" cy="240" r="280" fill="#8be6ff" opacity=".04"/>
  <!-- Cloud layers - golden dawn -->
  <path d="M0 400 C180 340 320 366 480 314 C640 260 780 300 960 244 C1140 186 1320 212 1500 162 V760 H0Z" fill="#0aacc2" opacity=".18"/>
  <path d="M0 478 C210 418 380 452 540 394 C720 334 880 382 1060 326 C1240 268 1380 296 1500 248 V760 H0Z" fill="#20344f" opacity=".14"/>
  <path d="M0 550 C220 492 400 534 580 476 C768 416 940 458 1120 400 C1280 350 1400 376 1500 342 V760 H0Z" fill="#f5e8d3" opacity=".20"/>
  <!-- Rift sparkles in upper sky -->
  <g fill="#8be6ff" opacity=".36">
    <circle cx="180" cy="90" r="10"/>
    <circle cx="380" cy="140" r="6"/>
    <circle cx="650" cy="70" r="8"/>
    <circle cx="1250" cy="110" r="7"/>
    <circle cx="1400" cy="80" r="9"/>
  </g>
  <!-- Golden sunlight rays -->
  <g stroke="#f2be63" stroke-width="8" stroke-linecap="round" opacity=".12">
    <path d="M860 240 L140 460"/>
    <path d="M860 240 L400 500"/>
    <path d="M860 240 L1100 480"/>
    <path d="M860 240 L1360 440"/>
  </g>
  <!-- Water reflections -->
  <g stroke="#fff8d9" stroke-width="7" stroke-linecap="round" opacity=".18">
    <path d="M160 616 H420"/>
    <path d="M540 574 H780"/>
    <path d="M960 534 H1240"/>
  </g>
</svg>
