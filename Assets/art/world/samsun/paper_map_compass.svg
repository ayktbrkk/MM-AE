<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- ============================================= -->
  <!-- Map and Compass Props v2                     -->
  <!-- Folded map + route dots + compass rose       -->
  <!-- ============================================= -->
  <!-- Drop shadow -->
  <ellipse cx="300" cy="360" rx="220" ry="28" fill="#1a2a3a" opacity="0.16"/>
  <!-- Map - base -->
  <path d="M100 200 L220 180 L380 190 L500 220 L480 340 L360 350 L200 340 L80 320Z" fill="#f5e8d3" stroke="#2b2730" stroke-width="8" stroke-linejoin="round"/>
  <!-- Map - fold line 1 -->
  <line x1="220" y1="180" x2="200" y2="340" stroke="#2b2730" stroke-width="4" stroke-linecap="round" opacity="0.24"/>
  <!-- Map - fold line 2 -->
  <line x1="380" y1="190" x2="360" y2="350" stroke="#2b2730" stroke-width="4" stroke-linecap="round" opacity="0.24"/>
  <!-- Map - route line -->
  <path d="M160 260 C220 230 280 240 340 220 C380 208 420 216 450 240" fill="none" stroke="#c84b3d" stroke-width="6" stroke-linecap="round" opacity="0.50"/>
  <!-- Route dots along path -->
  <g fill="#c84b3d" opacity="0.60">
    <circle cx="160" cy="260" r="5"/>
    <circle cx="200" cy="246" r="4"/>
    <circle cx="250" cy="238" r="5"/>
    <circle cx="300" cy="234" r="4"/>
    <circle cx="340" cy="220" r="5"/>
    <circle cx="390" cy="218" r="4"/>
    <circle cx="450" cy="240" r="5"/>
  </g>
  <!-- Map - X marks the spot -->
  <g stroke="#c84b3d" stroke-width="6" stroke-linecap="round" opacity="0.55">
    <line x1="440" y1="260" x2="460" y2="250"/>
    <line x1="460" y1="260" x2="440" y2="250"/>
  </g>
  <!-- Map - terrain markings -->
  <path d="M180 280 C220 270 260 280 300 274" fill="none" stroke="#8db572" stroke-width="4" stroke-linecap="round" opacity="0.30"/>
  <path d="M200 310 C240 300 280 310 320 304" fill="none" stroke="#8db572" stroke-width="3" stroke-linecap="round" opacity="0.26"/>
  <path d="M350 250 C370 240 390 244 410 250" fill="none" stroke="#438a87" stroke-width="3" stroke-linecap="round" opacity="0.24"/>
  <!-- Compass rose -->
  <circle cx="440" cy="150" r="40" fill="#f5e8d3" stroke="#2b2730" stroke-width="6"/>
  <circle cx="440" cy="150" r="32" fill="none" stroke="#2b2730" stroke-width="2" opacity="0.20"/>
  <!-- Compass - cardinal points -->
  <polygon points="440,116 436,144 444,144" fill="#c84b3d" stroke="#2b2730" stroke-width="3"/>
  <polygon points="440,184 436,156 444,156" fill="#fff8e7" stroke="#2b2730" stroke-width="3"/>
  <polygon points="406,150 434,146 434,154" fill="#fff8e7" stroke="#2b2730" stroke-width="3"/>
  <polygon points="474,150 446,146 446,154" fill="#fff8e7" stroke="#2b2730" stroke-width="3"/>
  <!-- Compass - N label -->
  <text x="440" y="126" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#fff8e7">N</text>
  <!-- Compass - center dot -->
  <circle cx="440" cy="150" r="4" fill="#2b2730"/>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.28">
    <circle cx="250" cy="300" r="8"/>
    <circle cx="150" cy="280" r="6"/>
    <circle cx="400" cy="300" r="7"/>
  </g>
</svg>
