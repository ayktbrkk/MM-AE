<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- ============================================= -->
  <!-- Bandırma Vapuru (Bandirma Ferry) Ship v1     -->
  <!-- The central historical landmark of the game  -->
  <!-- Warm wood + crimson + gold + navy palette    -->
  <!-- ============================================= -->
  <!-- Water shadow -->
  <ellipse cx="300" cy="370" rx="280" ry="24" fill="#1a2a3a" opacity="0.18"/>
  <!-- Water base -->
  <path d="M20 340 C80 310 180 300 300 300 C420 300 520 310 580 340 C520 370 420 380 300 380 C180 380 80 370 20 340Z" fill="#438a87" stroke="#2b2730" stroke-width="5" opacity="0.60"/>
  <!-- Water ripples -->
  <path d="M40 350 C100 340 180 336 300 336 C420 336 500 340 560 350" fill="none" stroke="#8bd3dc" stroke-width="4" stroke-linecap="round" opacity="0.30"/>
  <path d="M60 362 C140 352 240 348 300 348 C360 348 460 352 540 362" fill="none" stroke="#8bd3dc" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
  <path d="M80 372 C180 364 260 362 300 362 C340 362 420 364 520 372" fill="none" stroke="#8bd3dc" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
  <!-- Ship hull - bottom -->
  <path d="M140 320 C160 340 240 350 300 350 C360 350 440 340 460 320 L480 280 L120 280Z" fill="#5b3f2f" stroke="#2b2730" stroke-width="8" stroke-linejoin="round"/>
  <!-- Hull waterline (red) -->
  <path d="M148 310 C168 328 240 338 300 338 C360 338 432 328 452 310" fill="none" stroke="#c84b3d" stroke-width="8" stroke-linecap="round" opacity="0.50"/>
  <!-- Hull stripe -->
  <path d="M130 292 L470 292" stroke="#f2be63" stroke-width="6" stroke-linecap="round" opacity="0.36"/>
  <!-- Ship deck -->
  <rect x="120" y="240" width="360" height="40" rx="4" fill="#dab679" stroke="#2b2730" stroke-width="6"/>
  <!-- Deck planks -->
  <line x1="160" y1="250" x2="160" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <line x1="200" y1="250" x2="200" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <line x1="240" y1="250" x2="240" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <line x1="280" y1="250" x2="280" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <line x1="320" y1="250" x2="320" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <line x1="360" y1="250" x2="360" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <line x1="400" y1="250" x2="400" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <line x1="440" y1="250" x2="440" y2="280" stroke="#7a5a42" stroke-width="3" opacity="0.20"/>
  <!-- Cabin / Deck structure -->
  <rect x="180" y="200" width="240" height="40" rx="3" fill="#e8dfc8" stroke="#2b2730" stroke-width="6"/>
  <!-- Cabin windows -->
  <g fill="#8bd3dc" stroke="#2b2730" stroke-width="4" opacity="0.60">
    <rect x="200" y="210" width="20" height="18" rx="4"/>
    <rect x="240" y="210" width="20" height="18" rx="4"/>
    <rect x="280" y="210" width="20" height="18" rx="4"/>
    <rect x="320" y="210" width="20" height="18" rx="4"/>
    <rect x="360" y="210" width="20" height="18" rx="4"/>
  </g>
  <!-- Upper deck / Bridge -->
  <rect x="240" y="170" width="120" height="30" rx="3" fill="#f5e8d3" stroke="#2b2730" stroke-width="5"/>
  <rect x="260" y="178" width="16" height="14" rx="3" fill="#8bd3dc" stroke="#2b2730" stroke-width="3" opacity="0.50"/>
  <rect x="290" y="178" width="16" height="14" rx="3" fill="#8bd3dc" stroke="#2b2730" stroke-width="3" opacity="0.50"/>
  <rect x="320" y="178" width="16" height="14" rx="3" fill="#8bd3dc" stroke="#2b2730" stroke-width="3" opacity="0.50"/>
  <!-- Funnel (smokestack) -->
  <rect x="250" y="130" width="40" height="40" rx="2" fill="#c84b3d" stroke="#2b2730" stroke-width="5"/>
  <rect x="250" y="140" width="40" height="6" fill="#2b2730"/>
  <rect x="250" y="156" width="40" height="6" fill="#2b2730"/>
  <!-- Funnel top -->
  <rect x="246" y="126" width="48" height="8" rx="3" fill="#2b2730"/>
  <!-- Smoke puffs -->
  <g fill="#7a5a42" opacity="0.24">
    <circle cx="270" cy="114" r="10"/>
    <circle cx="260" cy="102" r="8"/>
    <circle cx="252" cy="88" r="6"/>
    <circle cx="246" cy="76" r="4"/>
  </g>
  <!-- Mast -->
  <line x1="340" y1="170" x2="340" y2="100" stroke="#5b3f2f" stroke-width="6" stroke-linecap="round"/>
  <!-- Mast flag -->
  <rect x="346" y="104" width="30" height="20" rx="2" fill="#c84b3d" stroke="#2b2730" stroke-width="4"/>
  <path d="M356 112 C360 108 370 108 374 112 C370 116 360 116 356 112Z" fill="#fff8e7"/>
  <!-- Bow (front) decoration -->
  <path d="M460 280 L480 250 L500 270 L480 290Z" fill="#dab679" stroke="#2b2730" stroke-width="5" stroke-linejoin="round"/>
  <path d="M470 260 L485 270" stroke="#2b2730" stroke-width="4" stroke-linecap="round"/>
  <!-- Stern (back) railing -->
  <path d="M120 240 L100 250 L110 270 L120 280" fill="none" stroke="#5b3f2f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.28">
    <circle cx="300" cy="290" r="5"/>
    <circle cx="200" cy="290" r="4"/>
    <circle cx="400" cy="290" r="4"/>
    <circle cx="340" cy="120" r="3"/>
    <circle cx="440" cy="330" r="6"/>
    <circle cx="160" cy="330" r="6"/>
  </g>
  <!-- Ship name text -->
  <text x="300" y="278" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2b2730" opacity="0.40">BANDIRMA</text>
</svg>
