<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- ============================================= -->
  <!-- Telegraph Station Props v2                   -->
  <!-- Desk + telegraph machine + morse paper + lamp-->
  <!-- ============================================= -->
  <!-- Drop shadow -->
  <ellipse cx="300" cy="360" rx="220" ry="30" fill="#1a1510" opacity="0.18"/>
  <!-- Desk - base -->
  <path d="M120 280 H480 L490 350 H110Z" fill="#7a5a42" stroke="#2b2730" stroke-width="10" stroke-linejoin="round"/>
  <!-- Desk - top surface -->
  <path d="M130 280 H470 L460 240 H140Z" fill="#dab679" stroke="#2b2730" stroke-width="8" stroke-linejoin="round"/>
  <!-- Desk - wood grain lines -->
  <path d="M160 260 C260 250 360 258 440 260" fill="none" stroke="#5b3f2f" stroke-width="4" stroke-linecap="round" opacity="0.22"/>
  <path d="M150 270 C250 262 350 268 450 270" fill="none" stroke="#5b3f2f" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
  <!-- Desk legs -->
  <path d="M140 350 V380 M180 350 V380 M420 350 V380 M460 350 V380" stroke="#5b3f2f" stroke-width="12" stroke-linecap="round"/>
  <!-- Telegraph machine - base -->
  <rect x="220" y="200" width="120" height="40" rx="6" fill="#5b3f2f" stroke="#2b2730" stroke-width="6"/>
  <!-- Telegraph - key lever -->
  <rect x="230" y="210" width="40" height="12" rx="4" fill="#2b2730"/>
  <line x1="250" y1="222" x2="250" y2="240" stroke="#2b2730" stroke-width="5" stroke-linecap="round"/>
  <!-- Telegraph - paper strip -->
  <rect x="280" y="206" width="48" height="16" rx="2" fill="#f5e8d3" stroke="#2b2730" stroke-width="4"/>
  <!-- Morse dots on paper -->
  <circle cx="294" cy="214" r="2" fill="#2b2730"/>
  <circle cx="302" cy="214" r="2" fill="#2b2730"/>
  <line x1="312" y1="210" x2="312" y2="218" stroke="#2b2730" stroke-width="3"/>
  <circle cx="320" cy="214" r="2" fill="#2b2730"/>
  <!-- Telegraph - wire -->
  <path d="M280 200 C260 170 240 150 200 140" fill="none" stroke="#2b2730" stroke-width="4" stroke-linecap="round"/>
  <path d="M280 200 C300 170 320 150 360 140" fill="none" stroke="#2b2730" stroke-width="4" stroke-linecap="round"/>
  <!-- Oil lamp - base -->
  <path d="M400 200 L420 150 L440 200Z" fill="#dab679" stroke="#2b2730" stroke-width="6" stroke-linejoin="round"/>
  <!-- Lamp - glass -->
  <ellipse cx="420" cy="140" rx="18" ry="22" fill="#f5e8d3" stroke="#2b2730" stroke-width="5" opacity="0.60"/>
  <!-- Lamp - flame glow -->
  <ellipse cx="420" cy="148" rx="8" ry="12" fill="#f2be63" opacity="0.50"/>
  <ellipse cx="420" cy="146" rx="4" ry="8" fill="#fff8e7" opacity="0.60"/>
  <!-- Lamp - top -->
  <path d="M406 118 L420 108 L434 118Z" fill="#5b3f2f" stroke="#2b2730" stroke-width="4" stroke-linejoin="round"/>
  <!-- Scattered paper sheets -->
  <path d="M140 210 L200 204 L206 226 L146 232Z" fill="#f5e8d3" stroke="#2b2730" stroke-width="4" stroke-linejoin="round" opacity="0.72"/>
  <path d="M150 214 C160 212 170 214 180 218" fill="none" stroke="#2b2730" stroke-width="2" stroke-linecap="round" opacity="0.30"/>
  <!-- Morse code tick marks -->
  <path d="M395 250 C400 244 408 242 416 248" fill="none" stroke="#2b2730" stroke-width="3" stroke-linecap="round" opacity="0.24"/>
  <!-- Gold glow dots -->
  <g fill="#f2be63" opacity="0.28">
    <circle cx="420" cy="155" r="12" opacity="0.15"/>
    <circle cx="300" cy="300" r="6"/>
    <circle cx="160" cy="270" r="5"/>
  </g>
</svg>
