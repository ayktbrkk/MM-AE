<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760">
  <!-- Congress Sky - Dramatic Crimson & Navy Evening -->
  <rect width="1500" height="760" fill="#1a2a3a"/>
  <!-- Setting sun glow - crimson horizon -->
  <circle cx="750" cy="320" r="80" fill="#c84b3d" opacity=".18"/>
  <circle cx="750" cy="320" r="160" fill="#c84b3d" opacity=".08"/>
  <circle cx="750" cy="320" r="260" fill="#c84b3d" opacity=".04"/>
  <!-- Dramatic cloud bands -->
  <path d="M0 380 C180 330 320 354 480 308 C640 260 780 296 960 246 C1140 196 1320 218 1500 174 V760 H0Z" fill="#20344f" opacity=".30"/>
  <path d="M0 460 C210 408 380 440 540 384 C720 328 880 370 1060 316 C1240 262 1380 290 1500 246 V760 H0Z" fill="#c84b3d" opacity=".16"/>
  <path d="M0 530 C220 478 400 516 580 462 C768 406 940 446 1120 394 C1280 346 1400 372 1500 340 V760 H0Z" fill="#f2be63" opacity=".08"/>
  <path d="M0 594 C240 544 420 580 620 528 C800 478 960 516 1140 468 C1300 426 1420 450 1500 420 V760 H0Z" fill="#f5e8d3" opacity=".14"/>
  <!-- Sun rays through clouds -->
  <g stroke="#f2be63" stroke-width="10" stroke-linecap="round" opacity=".06">
    <path d="M750 320 L100 540"/>
    <path d="M750 320 L300 580"/>
    <path d="M750 320 L1200 560"/>
    <path d="M750 320 L1400 520"/>
    <path d="M750 320 L750 600"/>
  </g>
  <!-- Sparkle accents -->
  <g fill="#f2be63" opacity=".22">
    <circle cx="160" cy="640" r="10"/>
    <circle cx="680" cy="660" r="14"/>
    <circle cx="1320" cy="630" r="12"/>
  </g>
  <!-- Distant flag silhouettes -->
  <g fill="#1a2a3a" opacity=".20">
    <rect x="380" y="200" width="3" height="120"/>
    <rect x="375" y="200" width="40" height="2"/>
    <rect x="1100" y="180" width="3" height="120"/>
    <rect x="1095" y="180" width="40" height="2"/>
  </g>
</svg>
