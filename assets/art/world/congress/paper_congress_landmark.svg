<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- ============================================= -->
  <!-- Congress Building Landmark v2                -->
  <!-- Classical columns + red pediment + flag      -->
  <!-- ============================================= -->
  <!-- Ground shadow -->
  <ellipse cx="300" cy="370" rx="260" ry="24" fill="#1a2a3a" opacity="0.18"/>
  <!-- Building base / steps -->
  <path d="M140 340 H460 V360 H140Z" fill="#e8dfc8" stroke="#2b2730" stroke-width="6" stroke-linejoin="round"/>
  <path d="M160 320 H440 V340 H160Z" fill="#f5e8d3" stroke="#2b2730" stroke-width="6" stroke-linejoin="round"/>
  <!-- Main building body -->
  <rect x="170" y="180" width="260" height="140" fill="#e8dfc8" stroke="#2b2730" stroke-width="8"/>
  <!-- Classical columns -->
  <g fill="#f5e8d3" stroke="#2b2730" stroke-width="5">
    <rect x="190" y="200" width="22" height="120" rx="3"/>
    <rect x="240" y="200" width="22" height="120" rx="3"/>
    <rect x="338" y="200" width="22" height="120" rx="3"/>
    <rect x="388" y="200" width="22" height="120" rx="3"/>
  </g>
  <!-- Column capitals -->
  <g fill="#dab679" stroke="#2b2730" stroke-width="4">
    <rect x="186" y="196" width="30" height="10" rx="2"/>
    <rect x="236" y="196" width="30" height="10" rx="2"/>
    <rect x="334" y="196" width="30" height="10" rx="2"/>
    <rect x="384" y="196" width="30" height="10" rx="2"/>
  </g>
  <!-- Pediment (triangular top) -->
  <path d="M160 180 L300 96 L440 180Z" fill="#c84b3d" stroke="#2b2730" stroke-width="8" stroke-linejoin="round"/>
  <!-- Pediment inner decoration -->
  <path d="M180 174 L300 108 L420 174Z" fill="none" stroke="#f2be63" stroke-width="4" stroke-linejoin="round" opacity="0.40"/>
  <!-- Pediment circle (clock/emblem) -->
  <circle cx="300" cy="148" r="16" fill="#f5e8d3" stroke="#2b2730" stroke-width="4"/>
  <circle cx="300" cy="148" r="4" fill="#2b2730"/>
  <!-- Door -->
  <rect x="274" y="260" width="52" height="60" rx="26" fill="#5b3f2f" stroke="#2b2730" stroke-width="5"/>
  <rect x="274" y="280" width="52" height="40" fill="#5b3f2f"/>
  <!-- Door arch detail -->
  <path d="M280 260 C280 248 320 248 320 260" fill="none" stroke="#f2be63" stroke-width="3" stroke-linecap="round" opacity="0.40"/>
  <!-- Windows -->
  <rect x="200" y="248" width="24" height="36" rx="12" fill="#8bd3dc" stroke="#2b2730" stroke-width="4" opacity="0.60"/>
  <rect x="376" y="248" width="24" height="36" rx="12" fill="#8bd3dc" stroke="#2b2730" stroke-width="4" opacity="0.60"/>
  <!-- Window cross -->
  <line x1="212" y1="248" x2="212" y2="284" stroke="#2b2730" stroke-width="3" opacity="0.40"/>
  <line x1="388" y1="248" x2="388" y2="284" stroke="#2b2730" stroke-width="3" opacity="0.40"/>
  <!-- Flag on top -->
  <line x1="300" y1="96" x2="300" y2="50" stroke="#5b3f2f" stroke-width="6" stroke-linecap="round"/>
  <rect x="304" y="54" width="40" height="26" rx="2" fill="#c84b3d" stroke="#2b2730" stroke-width="4"/>
  <!-- Flag crescent -->
  <path d="M324 64 C328 58 338 58 342 64 C346 70 338 72 334 72 C330 72 322 68 324 64Z" fill="#fff8e7"/>
  <circle cx="334" cy="65" r="2" fill="#c84b3d"/>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.28">
    <circle cx="300" cy="90" r="4"/>
    <circle cx="190" cy="360" r="6"/>
    <circle cx="410" cy="360" r="6"/>
    <circle cx="300" cy="370" r="5"/>
  </g>
</svg>
