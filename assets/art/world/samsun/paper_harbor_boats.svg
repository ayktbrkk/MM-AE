<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <!-- ============================================= -->
  <!-- paper_harbor_boats.svg                       -->
  <!-- 1919 Samsun Harbor — rowboat + seagull       -->
  <!-- Palette: #067078 #F5E8D3 #10202d #FFB340 #2B2730 -->
  <!-- ============================================= -->

  <!-- Katman 1: Gölge — sandal su yansıması -->
  <path d="M110 248 C180 258 280 264 370 260 C430 257 470 251 500 245 L500 262 C470 268 430 274 370 277 C280 281 180 275 110 265 Z" fill="#10202d" opacity="0.25"/>

  <!-- Katman 2: Sandal (rowboat) — ahşap tekne gövdesi -->
  <path d="M120 200 C155 182 215 172 295 172 C375 172 435 182 470 200 L450 238 C420 252 370 258 295 258 C220 258 170 252 140 238 Z" fill="#FFB340" stroke="#2B2730" stroke-width="10" stroke-linejoin="round"/>

  <!-- Sandal iç gövde (ahşap güverte tonu) -->
  <path d="M148 204 C180 192 230 186 295 186 C360 186 410 192 442 204 L430 234 C405 244 360 250 295 250 C230 250 185 244 160 234 Z" fill="#F5E8D3" stroke="#2B2730" stroke-width="6" stroke-linejoin="round" opacity="0.80"/>

  <!-- Sandal pruva vurgusu -->
  <path d="M120 200 C140 190 160 186 180 188" fill="none" stroke="#F5E8D3" stroke-width="6" stroke-linecap="round" opacity="0.50"/>

  <!-- Katman 3: Martı (seagull) — kanat açık uçuş silueti -->
  <path d="M390 68 C408 52 440 46 464 58 C470 61 476 62 482 60 C506 48 538 52 556 68 C540 78 520 70 502 78 C492 83 482 85 472 82 C462 79 452 79 442 82 C424 90 406 82 390 68 Z" fill="#F5E8D3" stroke="#2B2730" stroke-width="8" stroke-linejoin="round"/>

</svg>
