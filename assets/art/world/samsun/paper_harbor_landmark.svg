<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300">
  <!-- ============================================= -->
  <!-- Samsun Harbor Landmark v3                    -->
  <!-- Enhanced dock + water + roof + gold accents  -->
  <!-- ============================================= -->
  <!-- Shadow layer -->
  <ellipse cx="210" cy="262" rx="180" ry="32" fill="#1b2630" opacity="0.20"/>
  <!-- Water base -->
  <path d="M60 178 C106 124 180 110 250 120 C310 128 352 162 362 214 C276 244 148 242 60 178Z" fill="#8bd3dc" stroke="#2b2730" stroke-width="5" opacity="0.80"/>
  <!-- Water highlight -->
  <path d="M56 174 C116 144 192 148 256 156 C310 164 342 182 370 214" fill="none" stroke="#2b2730" stroke-width="10" stroke-linecap="round" opacity="0.20"/>
  <!-- Water ripple -->
  <path d="M100 200 C148 214 212 212 272 200" fill="none" stroke="#fff8e7" stroke-width="5" stroke-linecap="round" opacity="0.30"/>
  <path d="M130 216 C176 228 240 226 296 214" fill="none" stroke="#fff8e7" stroke-width="4" stroke-linecap="round" opacity="0.24"/>
  <!-- Dock platform - base -->
  <path d="M98 128 L312 128 L342 168 L74 168Z" fill="#e6bf75" stroke="#2b2730" stroke-width="6" stroke-linejoin="round"/>
  <!-- Dock edge shadow -->
  <path d="M90 124 L314 124" stroke="#7a5a42" stroke-width="12" stroke-linecap="round" opacity="0.44"/>
  <!-- Dock top surface -->
  <path d="M122 96 H288 L308 128 H104Z" fill="#f4dfaa" stroke="#2b2730" stroke-width="5" stroke-linejoin="round"/>
  <!-- Roof -->
  <path d="M144 72 H264 L284 98 H124Z" fill="#c84b3d" stroke="#2b2730" stroke-width="6" stroke-linejoin="round"/>
  <!-- Roof highlight -->
  <path d="M148 76 H256" stroke="#f2be63" stroke-width="5" stroke-linecap="round" opacity="0.30"/>
  <!-- Dock pillars -->
  <g stroke="#5b4433" stroke-width="14" stroke-linecap="round">
    <line x1="114" y1="168" x2="114" y2="220"/>
    <line x1="178" y1="168" x2="178" y2="228"/>
    <line x1="242" y1="168" x2="242" y2="226"/>
    <line x1="310" y1="168" x2="310" y2="216"/>
  </g>
  <!-- Pillar shadows (water reflection) -->
  <g stroke="#1b2630" stroke-width="10" stroke-linecap="round" opacity="0.12">
    <line x1="114" y1="220" x2="114" y2="244"/>
    <line x1="178" y1="228" x2="178" y2="252"/>
    <line x1="242" y1="226" x2="242" y2="250"/>
    <line x1="310" y1="216" x2="310" y2="240"/>
  </g>
  <!-- Water reflection - warm light -->
  <path d="M128 194 C182 210 248 208 308 192" fill="none" stroke="#f8e9c6" stroke-width="8" stroke-linecap="round" opacity="0.44"/>
  <!-- Accent light spots -->
  <circle cx="124" cy="186" r="10" fill="#f8e9c6" stroke="#2b2730" stroke-width="3"/>
  <circle cx="308" cy="182" r="10" fill="#f8e9c6" stroke="#2b2730" stroke-width="3"/>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.30">
    <circle cx="210" cy="74" r="6"/>
    <circle cx="152" cy="104" r="5"/>
    <circle cx="268" cy="104" r="5"/>
    <circle cx="210" cy="270" r="4"/>
  </g>
  <!-- Outline reinforcement -->
  <path d="M60 178 C106 124 180 110 250 120 C310 128 352 162 362 214" fill="none" stroke="#2b2730" stroke-width="6" stroke-linecap="round" opacity="0.14"/>
</svg>
