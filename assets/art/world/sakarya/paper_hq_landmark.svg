<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- ============================================= -->
  <!-- Mustafa Kemal's HQ Tent v1                    -->
  <!-- Sakarya - Battle Headquarters                 -->
  <!-- Colors: #5c4033, #d2b48c, #c84b3d            -->
  <!-- Outline: #3c2a1e stroke-width 8              -->
  <!-- ============================================= -->
  <!-- Ground shadow -->
  <ellipse cx="200" cy="275" rx="180" ry="18" fill="#0a0a1a" opacity="0.18"/>
  <!-- Tent base platform / ground -->
  <path d="M60 260 H340 V276 H60Z" fill="#5c4033" stroke="#3c2a1e" stroke-width="5" stroke-linejoin="round"/>
  <!-- Main tent body -->
  <path d="M70 260 L200 80 L330 260Z" fill="#d2b48c" stroke="#3c2a1e" stroke-width="8" stroke-linejoin="round"/>
  <!-- Tent front flap - left -->
  <path d="M120 260 L160 160 L200 260Z" fill="#c4a46c" stroke="#3c2a1e" stroke-width="5" stroke-linejoin="round"/>
  <!-- Tent front flap - right -->
  <path d="M200 260 L240 160 L280 260Z" fill="#c4a46c" stroke="#3c2a1e" stroke-width="5" stroke-linejoin="round"/>
  <!-- Tent opening - dark interior -->
  <path d="M160 260 L180 200 L200 180 L220 200 L240 260Z" fill="#2a1a0e" stroke="#3c2a1e" stroke-width="4" stroke-linejoin="round"/>
  <!-- Tent ridge pole top -->
  <circle cx="200" cy="78" r="6" fill="#d2b48c" stroke="#3c2a1e" stroke-width="5"/>
  <!-- Tent rope lines -->
  <g stroke="#8b7355" stroke-width="3" stroke-linecap="round" opacity="0.50">
    <line x1="80" y1="100" x2="50" y2="140"/>
    <line x1="320" y1="100" x2="350" y2="140"/>
    <line x1="100" y1="80" x2="70" y2="110"/>
    <line x1="300" y1="80" x2="330" y2="110"/>
  </g>
  <!-- Tent rope stakes -->
  <g fill="#5c4033" stroke="#3c2a1e" stroke-width="2">
    <rect x="46" y="136" width="8" height="6" rx="1"/>
    <rect x="346" y="136" width="8" height="6" rx="1"/>
    <rect x="66" y="106" width="8" height="6" rx="1"/>
    <rect x="326" y="106" width="8" height="6" rx="1"/>
  </g>
  <!-- Flag pole -->
  <line x1="200" y1="80" x2="200" y2="20" stroke="#5c4033" stroke-width="5" stroke-linecap="round"/>
  <!-- Turkish flag -->
  <rect x="204" y="22" width="36" height="22" rx="2" fill="#c84b3d" stroke="#3c2a1e" stroke-width="3"/>
  <!-- Flag crescent -->
  <path d="M220 30 C226 26 238 26 242 30 C246 34 236 36 232 36 C228 36 216 32 220 30Z" fill="#fff8e7"/>
  <circle cx="230" cy="31" r="2" fill="#c84b3d"/>
  <!-- Flag star -->
  <polygon points="226,28 228,32 232,32 229,34 230,38 226,36 222,38 223,34 220,32 224,32" fill="#fff8e7"/>
  <!-- Map table inside tent opening -->
  <rect x="182" y="230" width="36" height="10" fill="#8b7355" stroke="#3c2a1e" stroke-width="3"/>
  <rect x="186" y="232" width="28" height="6" fill="#d2b48c"/>
  <!-- Gold accent dots -->
  <g fill="#f2be63" opacity="0.24">
    <circle cx="200" cy="72" r="4"/>
    <circle cx="120" cy="220" r="5"/>
    <circle cx="280" cy="220" r="5"/>
    <circle cx="200" cy="270" r="4"/>
    <circle cx="90" cy="260" r="3"/>
    <circle cx="310" cy="260" r="3"/>
  </g>
  <!-- Sentry silhouette (left) -->
  <g fill="#2a1a0e" opacity="0.30">
    <ellipse cx="140" cy="260" rx="8" ry="6"/>
    <rect x="137" y="236" width="6" height="24" rx="2"/>
    <ellipse cx="140" cy="230" rx="6" ry="7"/>
    <!-- Rifle -->
    <rect x="142" y="226" width="2" height="34"/>
  </g>
  <!-- Sentry silhouette (right) -->
  <g fill="#2a1a0e" opacity="0.30">
    <ellipse cx="260" cy="260" rx="8" ry="6"/>
    <rect x="257" y="236" width="6" height="24" rx="2"/>
    <ellipse cx="260" cy="230" rx="6" ry="7"/>
    <!-- Rifle -->
    <rect x="256" y="226" width="2" height="34"/>
  </g>
</svg>
