<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780">
  <!-- ============================================= -->
  <!-- Sakarya Foreground Frame v1                   -->
  <!-- War-themed silhouettes: bayonet, trenches     -->
  <!-- Dark earth + deep olive tones                 -->
  <!-- ============================================= -->
  <!-- Bottom ground silhouette -->
  <path d="M0 540 C180 500 340 530 520 600 C700 672 880 660 1060 600 C1240 540 1420 526 1600 570 V780 H0Z" fill="#2a1a0e" opacity="0.50"/>
  <!-- Mid ground terrain - scorched earth -->
  <path d="M0 460 C140 424 260 438 400 490 C500 526 620 534 780 516 C980 496 1140 450 1600 476 V780 H0Z" fill="#1a2a1a" opacity="0.25"/>
  <!-- Left side - trench/bunker silhouette -->
  <g fill="#1a1a1a" opacity="0.50">
    <!-- Trench wall -->
    <path d="M0 40 C60 60 110 120 130 240 C142 320 148 400 140 520 V780 H0Z"/>
    <!-- Sandbag stack left -->
    <rect x="10" y="60" width="44" height="18" rx="3"/>
    <rect x="14" y="42" width="44" height="18" rx="3"/>
    <rect x="18" y="24" width="44" height="18" rx="3"/>
    <!-- Bayonet/silhouette -->
    <rect x="66" y="20" width="4" height="60"/>
    <path d="M66 20 L68 4 L70 20Z"/>
  </g>
  <!-- Right side - war-torn building silhouette -->
  <g fill="#1a1a1a" opacity="0.48">
    <path d="M1600 30 C1480 60 1380 160 1340 300 C1318 380 1306 460 1320 560 V780 H1600Z"/>
    <!-- Damaged building rooftops -->
    <path d="M1440 120 L1480 80 L1490 90 L1470 110 L1520 120Z" fill="#1a1a1a" opacity="0.52"/>
    <path d="M1500 160 L1540 120 L1550 130 L1530 150 L1580 160Z" fill="#1a1a1a" opacity="0.46"/>
    <!-- Collapsed wall -->
    <rect x="1420" y="180" width="40" height="50" rx="2" fill="#1a1a1a" opacity="0.44"/>
    <rect x="1420" y="180" width="24" height="25" rx="2" fill="#2a1a0e" opacity="0.30"/>
    <!-- Broken minaret -->
    <rect x="1384" y="100" width="8" height="60" fill="#1a1a1a" opacity="0.50"/>
    <path d="M1384 100 L1384 90 L1392 90 L1392 100Z" fill="#1a1a1a" opacity="0.45"/>
    <ellipse cx="1388" cy="96" rx="10" ry="6" fill="#1a1a1a" opacity="0.48"/>
  </g>
  <!-- Left foreground tree/branch silhouettes -->
  <g fill="#1a1a1a" opacity="0.48">
    <path d="M0 100 C50 130 100 200 120 310 V780 H0Z"/>
    <!-- Bare war-torn branches -->
    <path d="M40 180 C90 154 140 168 180 200" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" opacity="0.44"/>
    <path d="M20 260 C80 232 130 244 170 280" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" opacity="0.40"/>
    <path d="M60 140 C100 120 140 130 160 158" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" opacity="0.36"/>
    <!-- Broken branch -->
    <path d="M100 220 C130 200 155 210 170 240" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" opacity="0.34"/>
  </g>
  <!-- Decorative barbed wire / vine elements -->
  <g stroke="#5c3a1e" stroke-width="10" stroke-linecap="round" opacity="0.50">
    <path d="M100 580 C130 514 162 474 198 440"/>
    <path d="M1482 592 C1450 528 1416 482 1376 442"/>
    <path d="M230 654 C318 614 408 612 502 652"/>
    <path d="M1090 650 C1202 598 1316 606 1450 644"/>
  </g>
  <!-- Light branch overlay -->
  <g stroke="#6b4a3a" stroke-width="8" stroke-linecap="round" opacity="0.30">
    <path d="M60 548 C110 506 162 488 214 508"/>
    <path d="M1544 556 C1486 516 1426 496 1376 518"/>
  </g>
  <!-- Red accent dots - war markers -->
  <g fill="#8b2500" opacity="0.28">
    <circle cx="200" cy="590" r="16"/>
    <circle cx="1370" cy="598" r="18"/>
    <circle cx="1220" cy="674" r="12"/>
    <circle cx="360" cy="568" r="10"/>
    <circle cx="1000" cy="628" r="11"/>
    <circle cx="660" cy="660" r="9"/>
  </g>
</svg>
