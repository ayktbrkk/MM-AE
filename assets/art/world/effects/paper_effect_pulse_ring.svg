<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- İşaretçi Halkası - Marker Pulse Ring -->
  <!-- Outer pulse ring 1 -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#38c7ff" stroke-width="2" opacity="0.08"/>
  <circle cx="60" cy="60" r="48" fill="none" stroke="#38c7ff" stroke-width="2" opacity="0.14"/>
  <!-- Pulse ring 2 - mid -->
  <circle cx="60" cy="60" r="36" fill="none" stroke="#0aacc2" stroke-width="2.5" opacity="0.22"/>
  <!-- Pulse ring 3 - inner -->
  <circle cx="60" cy="60" r="24" fill="none" stroke="#38c7ff" stroke-width="3" opacity="0.30"/>
  <!-- Core dot -->
  <circle cx="60" cy="60" r="8" fill="#8be6ff" opacity="0.24"/>
  <circle cx="60" cy="60" r="4" fill="#fff8d9" opacity="0.36"/>
  <!-- 4 cardinal direction accent dots -->
  <g fill="#38c7ff" opacity="0.40">
    <circle cx="60" cy="16" r="3"/>
    <circle cx="60" cy="104" r="3"/>
    <circle cx="16" cy="60" r="3"/>
    <circle cx="104" cy="60" r="3"/>
  </g>
  <!-- Connecting lines -->
  <g stroke="#38c7ff" stroke-width="1.5" stroke-linecap="round" opacity="0.16">
    <line x1="60" y1="24" x2="60" y2="36"/>
    <line x1="60" y1="96" x2="60" y2="84"/>
    <line x1="24" y1="60" x2="36" y2="60"/>
    <line x1="96" y1="60" x2="84" y2="60"/>
  </g>
</svg>
