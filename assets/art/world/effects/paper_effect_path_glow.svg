<svg xmlns="http://www.w3.org/2000/svg" width="160" height="80" viewBox="0 0 160 80">
  <!-- Yol Parıltısı - Path Glow Highlight -->
  <!-- Outer glow -->
  <ellipse cx="80" cy="40" rx="76" ry="38" fill="#f2be63" opacity="0.06"/>
  <!-- Mid glow -->
  <ellipse cx="80" cy="40" rx="60" ry="30" fill="#f2be63" opacity="0.10"/>
  <!-- Inner glow -->
  <ellipse cx="80" cy="40" rx="44" ry="22" fill="#f2be63" opacity="0.16"/>
  <!-- Core path segment -->
  <rect x="10" y="32" width="140" height="16" rx="8" fill="#f5e8d3" opacity="0.20"/>
  <!-- Top sparkle dots -->
  <g fill="#fff8d9" opacity="0.40">
    <circle cx="30" cy="20" r="3"/>
    <circle cx="80" cy="12" r="4"/>
    <circle cx="130" cy="18" r="3"/>
  </g>
  <!-- Bottom sparkle dots -->
  <g fill="#fff8d9" opacity="0.28">
    <circle cx="50" cy="60" r="2.5"/>
    <circle cx="110" cy="62" r="3"/>
  </g>
  <!-- Left/right accent glows -->
  <ellipse cx="20" cy="40" rx="6" ry="12" fill="#f2be63" opacity="0.20"/>
  <ellipse cx="140" cy="40" rx="6" ry="12" fill="#f2be63" opacity="0.20"/>
</svg>
