<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Bilgi Yıldızı - Knowledge Star Token -->
  <!-- Shadow -->
  <path d="M40 6 L48 28 L72 28 L52 42 L58 64 L40 50 L22 64 L28 42 L8 28 L32 28Z" fill="#10202d" opacity="0.22" transform="translate(2,2)"/>
  <!-- Star body - cream paper -->
  <path d="M40 4 L48 26 L72 26 L52 40 L58 62 L40 48 L22 62 L28 40 L8 26 L32 26Z" fill="#f5e8d3" stroke="#0d121f" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner star - gold -->
  <path d="M40 14 L44 28 L58 28 L48 36 L52 50 L40 42 L28 50 L32 36 L22 28 L36 28Z" fill="#f2be63" opacity="0.70"/>
  <!-- Center dot -->
  <circle cx="40" cy="36" r="6" fill="#ffb340"/>
  <!-- Outline reinforcement on tips -->
  <g stroke="#0d121f" stroke-width="3" stroke-linecap="round">
    <path d="M40 4 L40 14"/>
    <path d="M72 26 L58 28"/>
    <path d="M58 62 L52 50"/>
    <path d="M22 62 L28 50"/>
    <path d="M8 26 L22 28"/>
  </g>
  <!-- Sparkle accent -->
  <g fill="#fff8d9" opacity="0.60">
    <circle cx="52" cy="22" r="3"/>
    <circle cx="32" cy="44" r="2"/>
  </g>
</svg>
